services:
  postgres:
    image: postgres:16
    container_name: meetly-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: meetly
      POSTGRES_PASSWORD: meetly_password
      POSTGRES_DB: meetly_db
    ports:
      - "5432:5432"
    volumes:
      - meetly-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meetly -d meetly_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  turn:
    image: coturn/coturn:latest
    container_name: meetly-turn
    restart: unless-stopped
    ports:
      - "3478:3478"
      - "3478:3478/udp"
      - "50000-50050:50000-50050/udp"
    command:
      - -n
      - --log-file=stdout
      - --lt-cred-mech
      - --user=meetly_user:meetly_password
      - --realm=meetly.local
      - --listening-port=3478
      - --min-port=50000
      - --max-port=50050
      - --fingerprint
      - --no-cli

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: meetly-server
    restart: unless-stopped

    ports:
      - "4000:4000"
      - "40000-40100:40000-40100/udp"
      - "40000-40100:40000-40100/tcp"
    environment:
      PORT: 4000
      NODE_ENV: development
      CLIENT_URLS: http://localhost:5173,http://127.0.0.1:5173
      JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgresql://meetly:meetly_password@postgres:5432/meetly_db?schema=public
      COOKIE_SECURE: "false"
      COOKIE_SAME_SITE: lax
      MEDIASOUP_LISTEN_IP: 0.0.0.0
      MEDIASOUP_ANNOUNCED_IP: 127.0.0.1
      MEDIASOUP_MIN_PORT: 40000
      MEDIASOUP_MAX_PORT: 40100
      RECORDINGS_DIR: /app/recordings
      FFMPEG_PATH: ffmpeg
      RECORDING_RETENTION_DAYS: 30
    volumes:
      - ./server/recordings:/app/recordings
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  meetly-postgres-data:
